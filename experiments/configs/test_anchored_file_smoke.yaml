name: test_anchored_file_smoke
description: >
  CPU smoke test for reference-atlas distillation (plan §4.3). Same synthetic
  gaussian-blobs edge-list setup as test_anchored_smoke, but with
  train.anchored_init=file so the encoder regresses a teacher layout parquet
  (train.anchored_init_path) instead of PCA, and train.anchor_hold_weight>0 so
  an ongoing MSE-to-teacher term is applied throughout the main UMAP phase. The
  data / edge .npz / teacher parquet paths below are placeholders;
  tests/test_variants.py generates them under a tmp dir and overrides these
  fields at runtime.

data:
  source: memmap
  memmap_dirs:
    - /tmp/basemap_variants_smoke/blobs_32d
  input_dim: 32
  precomputed_edges_path: /tmp/basemap_variants_smoke/blobs_edges_k10.npz
  n_neighbors: 10
  random_seed: 42

model:
  architecture: residual_bottleneck
  hidden_dim: 128
  n_layers: 3
  n_components: 2
  a: 1.0
  b: 1.0

train:
  n_epochs: 10
  batch_size: 1024
  learning_rate: 0.01
  correlation_weight: 0.0
  pos_ratio: 0.2
  clip_grad_norm: 1.0
  positive_target_mode: binary
  lr_schedule: cosine
  warmup_steps: 20
  total_steps_estimate: 1200
  use_amp: false
  device: cpu
  verbose: false
  anchored_init: file
  anchored_init_epochs: 20
  anchored_init_lr: 0.001
  anchored_init_path: /tmp/basemap_variants_smoke/teacher_coords.parquet
  anchor_hold_weight: 10.0
  anchor_hold_fraction: 0.1

eval:
  metrics:
    - trustworthiness
    - distance_correlation
    - knn_preservation
    - silhouette
  knn_k: 10
  metric_sample_size: 5000

logging:
  use_wandb: false
  results_dir: /tmp/basemap_variants_smoke/results
  persist_run: true
  save_embeddings: false
