name: knn_focus
description: "Targeted experiments to improve KNN preservation on ls-squad 20k"

data:
  source: h5
  h5_path: /Users/enjalot/latent-scope-demo/ls-squad/embeddings/embedding-003.h5
  h5_dataset: embeddings
  input_dim: 768
  reference_umap_path: /Users/enjalot/latent-scope-demo/ls-squad/umaps/umap-001.parquet
  n_neighbors: 100
  random_seed: 42

model:
  hidden_dim: 512
  n_layers: 3
  n_components: 2
  # Standard UMAP a/b for min_dist=0.1 (was 1.0/1.0 before!)
  a: 1.5769
  b: 0.8951

train:
  n_epochs: 10
  batch_size: 512
  learning_rate: 0.001
  correlation_weight: 0.1
  pos_ratio: 0.5
  clip_grad_norm: 1.0

eval:
  metrics:
    - trustworthiness
    - distance_correlation
    - knn_preservation
  knn_k: 10
  metric_sample_size: 5000

logging:
  use_wandb: true
  wandb_project: pumap-knn-focus
  wandb_group: knn-focus
  results_dir: experiments/results
  save_model: true
  save_embeddings: true
