name: local_ls_squad_nn100_precomputed
description: "Local GSV LS-SQuAD transductive baseline with nn100 precomputed graph"

data:
  source: h5
  h5_path: /data/latent-basemap/ls-squad/embedding-003.h5
  h5_dataset: embeddings
  input_dim: 768
  reference_umap_path: /data/latent-basemap/ls-squad/umap-001.parquet
  n_neighbors: 100
  precomputed_p_sym_path: /data/latent-basemap/precomputed/ls-squad_nn100_psym.pkl
  precomputed_negatives_path: /data/latent-basemap/precomputed/ls-squad_nn100_negatives.pkl
  random_seed: 42

model:
  hidden_dim: 512
  n_layers: 3
  n_components: 2
  a: 1.9
  b: 0.8951

train:
  n_epochs: 10
  batch_size: 1024
  learning_rate: 0.001
  correlation_weight: 0.1
  pos_ratio: 0.5
  clip_grad_norm: 1.0
  low_memory: false
  verbose: false

eval:
  metrics:
    - trustworthiness
    - distance_correlation
    - knn_preservation
  knn_k: 10
  metric_sample_size: 5000
  compare_umap: false

logging:
  use_wandb: false
  results_dir: experiments/results
  save_model: true
  save_embeddings: true
